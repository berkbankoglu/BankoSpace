name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'BankoSpace ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download and install.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
          updaterJsonKeepUniversal: true

      - name: Sign and upload latest.json (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          EXE=$(find src-tauri/target/release/bundle/nsis -name "*.exe" 2>/dev/null | head -1)
          if [ -z "$EXE" ]; then
            echo "No NSIS installer found, skipping signing"
            exit 0
          fi

          echo "Signing: $EXE"
          npx tauri signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" -p "" "$EXE"

          SIG=$(cat "${EXE}.sig" | tr -d '\n')
          VERSION=$(echo $TAG | sed 's/^v//')
          EXE_NAME=$(basename "$EXE")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/berkbankoglu/BankoSpace/releases/download/${TAG}"

          cat > latest.json << JSONEOF
          {
            "version": "${VERSION}",
            "notes": "",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG}",
                "url": "${BASE_URL}/${EXE_NAME}"
              }
            }
          }
          JSONEOF

          gh release upload "${TAG}" "${EXE}.sig" "latest.json" --clobber
          echo "Done — latest.json and .sig uploaded"
